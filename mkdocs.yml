site_name: clientcraft
site_description: A declarative, type-safe API client framework for Python
site_url: https://sunbright-technologies.github.io/clientcraft/
repo_url: https://github.com/Sunbright-Technologies/clientcraft
repo_name: Sunbright-Technologies/clientcraft
copyright: Copyright &copy; SunBright Technologies

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - Guide:
      - Endpoints: endpoints.md
      - Requests & Responses: requests-responses.md
      - Parameterless Endpoints: parameterless-endpoints.md
      - Async Clients: async.md
      - Backends: backends.md
      - Error Handling: error-handling.md
      - Custom Backends: custom-backends.md
  - Reference:
      - How It Works: how-it-works.md
      - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            docstring_style: google
            members_order: source
            separate_signature: true
            show_signature_annotations: true
