repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # --unsafe: validate YAML syntax only, allowing framework-specific tags
        # such as mkdocs-material's !!python/name:... emoji constructors.
        args: [--unsafe]
      - id: check-toml
      - id: check-added-large-files

  # Run the project's own ruff (the one in the uv venv, same as CI) so the hook
  # and `uv run ruff` in CI never disagree. A pinned ruff-pre-commit rev drifts
  # from the venv's `ruff>=0.8` and produces different formatting.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.8
    hooks:
      - id: uv-lock
